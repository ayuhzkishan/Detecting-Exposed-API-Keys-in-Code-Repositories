# secretguard/rules.toml

[[rules]]
id = "aws-access-key"
description = "AWS Access Key ID"
regex = '''(?i)AKIA[0-9A-Z]{16}'''
tags = ["aws", "key"]
severity = "high"

[[rules]]
id = "aws-secret-key"
description = "AWS Secret Access Key"
# Requires the variable/config name to contain "aws" and "secret" — avoids matching arbitrary 40-char strings
regex = '''(?i)aws[_\-\s]*(secret[_\-\s]*access[_\-\s]*key|secret[_\-\s]*key)\s*[:=]\s*["']?[A-Za-z0-9/+=]{40}["']?'''
tags = ["aws", "secret"]
severity = "critical"
entropy_min = 3.8

[[rules]]
id = "github-token"
description = "GitHub Personal Access Token (classic or fine-grained)"
regex = '''gh[pousr]_[0-9a-zA-Z]{36}'''
tags = ["github", "token"]
severity = "high"

[[rules]]
id = "stripe-secret-key"
description = "Stripe Secret Key"
regex = '''sk_live_[0-9a-zA-Z]{24}'''
tags = ["stripe"]
severity = "high"

[[rules]]
id = "private-key-openssh"
description = "OpenSSH Private Key"
regex = '''-----BEGIN OPENSSH PRIVATE KEY-----'''
tags = ["private-key", "ssh"]
severity = "critical"

[[rules]]
id = "private-key-rsa"
description = "RSA Private Key"
regex = '''-----BEGIN RSA PRIVATE KEY-----'''
tags = ["private-key", "rsa"]
severity = "critical"

[[rules]]
id = "generic-api-key"
description = "Generic API key / token assignment"
regex = '''(?i)(api[_-]?key|secret|token|password|pwd|api[_-]?secret|auth[_-]?token)\s*[:=]\s*["']?[a-zA-Z0-9\-_]{20,100}["']?'''
tags = ["generic", "api"]
severity = "medium"
min_length = 20

[[rules]]
id = "slack-token"
description = "Slack Token (classic bot/user token)"
regex = '''xox[baprs]-[0-9]{10,12}-[0-9]{10,12}-[0-9]{10,12}-[a-z0-9]{32}'''
tags = ["slack", "token"]
severity = "high"